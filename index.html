<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fridge Hero 🍳</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
    :root {
      --bg: #0e0e0e;
      --card: #181818;
      --card2: #212121;
      --border: #2e2e2e;
      --accent: #f97316;
      --accent2: #fbbf24;
      --text: #f0f0f0;
      --muted: #6b6b6b;
      --success: #4ade80;
      --danger: #f87171;
      --radius: 14px;
    }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }
 
    /* ── Header ── */
    .header { text-align: center; margin-bottom: 32px; }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.6rem, 9vw, 3.8rem);
      font-weight: 800; letter-spacing: -0.03em; line-height: 1;
      color: var(--text);
    }
    h1 .highlight {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header .icon { display: block; font-size: 2rem; margin: 6px 0 10px; }
    .subtitle { color: var(--muted); font-size: 0.95rem; font-weight: 300; }
 
    /* ── Card ── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 28px 24px;
      width: 100%; max-width: 440px;
    }
 
    /* ── Section label ── */
    .label {
      font-family: 'Syne', sans-serif; font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }
 
    /* ── Ingredient inputs ── */
    .ingredients { margin-bottom: 22px; display: flex; flex-direction: column; gap: 8px; }
    .input-row { position: relative; }
    .input-row .num {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 800;
      color: var(--accent); background: rgba(249,115,22,0.12);
      border-radius: 5px; width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    input[type="text"] {
      width: 100%; padding: 12px 14px 12px 42px;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
    }
 
    /* ── Chips ── */
    .chip-section { margin-bottom: 22px; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 13px;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 999px; font-size: 0.82rem; font-weight: 500;
      cursor: pointer; transition: all 0.18s; user-select: none;
      color: var(--muted);
    }
    .chip:hover { border-color: rgba(249,115,22,0.5); color: var(--text); }
    .chip.active { background: rgba(249,115,22,0.12); border-color: var(--accent); color: var(--accent); }
    .chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background 0.18s; flex-shrink: 0; }
    .chip.active .dot { background: var(--accent); }
    .chip input[type="checkbox"] { display: none; }
 
    /* ── Servings ── */
    .servings-section { margin-bottom: 22px; }
    .stepper {
      display: inline-flex; align-items: center;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .stepper button {
      width: 36px; height: 36px; background: none; border: none;
      color: var(--text); font-size: 1.1rem; cursor: pointer;
      transition: background 0.15s; display: flex; align-items: center; justify-content: center;
    }
    .stepper button:hover { background: var(--border); }
    .stepper .val {
      min-width: 34px; text-align: center;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem;
    }
    .people-label { display: inline-block; margin-left: 10px; color: var(--muted); font-size: 0.88rem; }
 
    /* ── Cook button ── */
    .cook-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border: none; border-radius: var(--radius);
      color: #0e0e0e; font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 800; letter-spacing: 0.05em;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    .cook-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(249,115,22,0.3); }
    .cook-btn:active { transform: translateY(0); }
    .cook-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
 
    /* ── Loading ── */
    .loading { display: none; text-align: center; padding: 22px 0 0; color: var(--muted); font-size: 0.88rem; }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; margin: 0 auto 10px; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
 
    /* ── Error ── */
    .error-msg {
      display: none; margin-top: 12px; padding: 11px 14px;
      background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px; color: var(--danger); font-size: 0.85rem; text-align: center;
    }
 
    /* ── Recipe Result ── */
    .result { display: none; width: 100%; max-width: 440px; margin-top: 20px; animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
 
    .result-header {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px 20px 0 0; padding: 22px 24px 18px; border-bottom: none;
    }
    .result-tag {
      font-family: 'Syne', sans-serif; font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
    }
    .dish-name { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--text); line-height: 1.2; }
    .applied-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .applied-tag {
      font-size: 0.7rem; padding: 3px 9px; border-radius: 999px;
      background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.25);
      color: var(--success); font-weight: 500;
    }
    .applied-tag.cuisine { background: rgba(249,115,22,0.08); border-color: rgba(249,115,22,0.25); color: var(--accent); }
 
    /* ── Steps timeline ── */
    .steps-container {
      background: var(--card); border: 1px solid var(--border);
      border-top: 1px solid var(--border); border-radius: 0 0 20px 20px; overflow: hidden;
    }
    .step-item {
      display: flex; align-items: stretch;
      border-bottom: 1px solid var(--border);
      animation: stepIn 0.35s ease both;
    }
    .step-item:last-child { border-bottom: none; }
    @keyframes stepIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
 
    .step-num-col {
      display: flex; flex-direction: column; align-items: center;
      padding: 18px 0 0 20px; min-width: 52px; padding-bottom: 18px;
    }
    .step-circle {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0e0e0e; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.75rem;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .step-line { width: 2px; flex: 1; background: var(--border); margin-top: 6px; min-height: 12px; }
    .step-item:last-child .step-line { display: none; }
 
    .step-body { padding: 16px 20px 16px 10px; flex: 1; }
    .step-title {
      font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 5px;
    }
    .step-detail { font-size: 0.88rem; color: #ccc; line-height: 1.6; }
  </style>
</head>
<body>
 
  <div class="header">
    <h1>Fridge <span class="highlight">Hero</span></h1>
    <span class="icon">🔍</span>
    <p class="subtitle">Three ingredients. Endless possibilities.</p>
  </div>
 
  <div class="card">
 
    <p class="label">Your Ingredients</p>
    <div class="ingredients">
      <div class="input-row"><span class="num">1</span><input type="text" id="ing1" placeholder="e.g., Chicken"></div>
      <div class="input-row"><span class="num">2</span><input type="text" id="ing2" placeholder="e.g., Lemon"></div>
      <div class="input-row"><span class="num">3</span><input type="text" id="ing3" placeholder="e.g., Garlic"></div>
    </div>
 
    <div class="chip-section">
      <p class="label">Dietary Restrictions</p>
      <div class="chips">
        <label class="chip"><input type="checkbox" name="diet" value="Vegetarian"><span class="dot"></span>🌿 Vegetarian</label>
        <label class="chip"><input type="checkbox" name="diet" value="Vegan"><span class="dot"></span>🌱 Vegan</label>
        <label class="chip"><input type="checkbox" name="diet" value="Gluten-Free"><span class="dot"></span>🌾 Gluten-Free</label>
        <label class="chip"><input type="checkbox" name="diet" value="Keto"><span class="dot"></span>🥑 Keto</label>
        <label class="chip"><input type="checkbox" name="diet" value="Dairy-Free"><span class="dot"></span>🥛 Dairy-Free</label>
        <label class="chip"><input type="checkbox" name="diet" value="Nut-Free"><span class="dot"></span>🥜 Nut-Free</label>
      </div>
    </div>
 
    <div class="servings-section">
      <p class="label">Servings</p>
      <div class="stepper">
        <button id="decBtn" type="button">−</button>
        <span class="val" id="servingVal">2</span>
        <button id="incBtn" type="button">+</button>
      </div>
      <span class="people-label">people</span>
    </div>
 
    <div class="chip-section">
      <p class="label">Cuisine Style (Optional)</p>
      <div class="chips">
        <label class="chip"><input type="checkbox" name="cuisine" value="Italian"><span class="dot"></span>🇮🇹 Italian</label>
        <label class="chip"><input type="checkbox" name="cuisine" value="Indian"><span class="dot"></span>🇮🇳 Indian</label>
        <label class="chip"><input type="checkbox" name="cuisine" value="Japanese"><span class="dot"></span>🇯🇵 Japanese</label>
        <label class="chip"><input type="checkbox" name="cuisine" value="Mexican"><span class="dot"></span>🇲🇽 Mexican</label>
        <label class="chip"><input type="checkbox" name="cuisine" value="Mediterranean"><span class="dot"></span>🫒 Mediterranean</label>
      </div>
    </div>
 
    <button class="cook-btn" id="cookBtn">✨ Cook Magic</button>
    <div class="loading" id="loading"><div class="spinner"></div><p>Crafting your masterpiece…</p></div>
    <div class="error-msg" id="errorMsg"></div>
  </div>
 
  <div class="result" id="result">
    <div class="result-header">
      <div class="result-tag">Your Recipe</div>
      <div class="dish-name" id="dishName"></div>
      <div class="applied-tags" id="appliedTags"></div>
    </div>
    <div class="steps-container" id="stepsContainer"></div>
  </div>
 
  <script>
    
    // ── Chip toggle ──
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const cb = chip.querySelector('input[type="checkbox"]');
        if (cb.name === 'cuisine') {
          document.querySelectorAll('input[name="cuisine"]').forEach(c => {
            c.checked = false; c.closest('.chip').classList.remove('active');
          });
          cb.checked = true; chip.classList.add('active');
        } else {
          cb.checked = !cb.checked; chip.classList.toggle('active', cb.checked);
        }
      });
    });
 
    // ── Servings ──
    let servings = 2;
    document.getElementById('incBtn').addEventListener('click', () => { if (servings < 12) { servings++; document.getElementById('servingVal').textContent = servings; } });
    document.getElementById('decBtn').addEventListener('click', () => { if (servings > 1) { servings--; document.getElementById('servingVal').textContent = servings; } });
 
    // ── Cook ──
    document.getElementById('cookBtn').addEventListener('click', async () => {
      const ing1 = document.getElementById('ing1').value.trim();
      const ing2 = document.getElementById('ing2').value.trim();
      const ing3 = document.getElementById('ing3').value.trim();
      if (!ing1 || !ing2 || !ing3) { showError('Please enter all 3 ingredients.'); return; }
 
      const diets = Array.from(document.querySelectorAll('input[name="diet"]:checked')).map(c => c.value);
      const cuisineEl = document.querySelector('input[name="cuisine"]:checked');
      const cuisine = cuisineEl ? cuisineEl.value : null;
 
      const dietClause = diets.length > 0
        ? `CRITICAL: Strictly follow these dietary restrictions: ${diets.join(', ')}. Do NOT include any violating ingredients.` : '';
      const cuisineClause = cuisine ? `The dish should be inspired by ${cuisine} cuisine.` : '';
      const servingsClause = `This recipe is for ${servings} ${servings === 1 ? 'person' : 'people'}.`;
 
      const prompt = `You are a creative Michelin-star chef. Given these 3 ingredients: ${ing1}, ${ing2}, ${ing3}, create a detailed step-by-step recipe.
 
${dietClause}
${cuisineClause}
${servingsClause}
 
Respond ONLY with valid JSON — no markdown, no explanation:
{
  "dishName": "Creative dish name",
  "steps": [
    { "title": "Short step title", "detail": "One clear, detailed instruction sentence for this step." },
    { "title": "Short step title", "detail": "One clear, detailed instruction sentence for this step." },
    { "title": "Short step title", "detail": "One clear, detailed instruction sentence for this step." },
    { "title": "Short step title", "detail": "One clear, detailed instruction sentence for this step." },
    { "title": "Short step title", "detail": "One clear, detailed instruction sentence for this step." },
    { "title": "Short step title", "detail": "One clear, detailed instruction sentence for this step." }
  ]
}`;
 
      const btn = document.getElementById('cookBtn');
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');
      const errorMsg = document.getElementById('errorMsg');
 
      btn.disabled = true; loading.style.display = 'block';
      result.style.display = 'none'; errorMsg.style.display = 'none';
 
      try {
        // Look here! We changed GEMINI_URL to '/api/chat'
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        
        if (!response.ok) throw new Error(`API error ${response.status}`);
// ... the rest of your code stays exactly the same!
        const data = await response.json();
        let text = data.candidates[0].content.parts[0].text.trim();
        text = text.replace(/```json\s*/g, '').replace(/```/g, '').trim();
        const recipe = JSON.parse(text);
 
        document.getElementById('dishName').textContent = recipe.dishName;
 
        const tagsEl = document.getElementById('appliedTags');
        tagsEl.innerHTML = '';
        diets.forEach(d => {
          const s = document.createElement('span'); s.className = 'applied-tag';
          s.textContent = '✓ ' + d; tagsEl.appendChild(s);
        });
        if (cuisine) {
          const s = document.createElement('span'); s.className = 'applied-tag cuisine';
          s.textContent = cuisine + ' style'; tagsEl.appendChild(s);
        }
 
        const container = document.getElementById('stepsContainer');
        container.innerHTML = '';
        recipe.steps.forEach((step, i) => {
          const item = document.createElement('div');
          item.className = 'step-item';
          item.style.animationDelay = `${i * 0.09}s`;
          item.innerHTML = `
            <div class="step-num-col">
              <div class="step-circle">${i + 1}</div>
              <div class="step-line"></div>
            </div>
            <div class="step-body">
              <div class="step-title">${step.title}</div>
              <div class="step-detail">${step.detail}</div>
            </div>`;
          container.appendChild(item);
        });
 
        result.style.display = 'block';
        setTimeout(() => result.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
 
      } catch (err) {
        showError('The kitchen hit a snag — please try again!');
        console.error(err);
      } finally {
        btn.disabled = false; loading.style.display = 'none';
      }
    });
 
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg; el.style.display = 'block';
    }
  </script>
</body>
</html>
